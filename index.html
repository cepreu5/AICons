<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гориво</title>
    <link rel="icon" href="Gas.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <div class="theme-switcher">
            <label for="themeToggle">
                <input type="checkbox" id="themeToggle">
                <span class="toggle-switch"></span>
            </label>
        </div>
        <h1 id="mainTitle">⛽ Зареждане на гориво</h1>

        <form id="fuelForm">
            <input type="hidden" id="password" value="123">

            <div class="form-group">
                <label for="vehicle">🚗 Автомобил:</label>
                <div class="vehicle-select-container">
                    <select id="vehicle">
                    </select>
                    <button type="button" id="pinVehicleBtn" title="Запази като избор по подразбиране">📌</button>
                </div>
            </div>

            <div class="group-box">
                <label class="group-title">📸 Километраж:</label>
                <div class="file-input-container">
                    <span id="odomStatus" class="upload-status"></span>
                    <input type="file" id="odometerCam" accept="image/*" capture="environment" style="display:none;">
                    <input type="file" id="odometerFile" accept="image/*" style="display:none;">
                    <button type="button" class="select-btn" onclick="document.getElementById('odometerCam').click()">
                        📷 Камера
                    </button>
                    <button type="button" class="select-btn" onclick="document.getElementById('odometerFile').click()">
                        🖼️ Галерия
                    </button>
                    <button type="button" id="deleteOdomBtn" class="delete-btn"
                        title="Изчисти снимката и полетата">🗑️</button>
                </div>
                <div class="manual-inputs-grid">
                    <div style="flex: 1;">
                        <label for="manualOdoTotal"
                            style="font-weight: normal; font-size: 12px; margin-bottom: 2px;">Общ:</label>
                        <input type="text" id="manualOdoTotal" placeholder="напр. 400 или 101400" inputmode="numeric">
                    </div>
                    <div style="flex: 1;">
                        <label for="manualOdoTrip"
                            style="font-weight: normal; font-size: 12px; margin-bottom: 2px;">Дневен:</label>
                        <input type="number" id="manualOdoTrip" placeholder="" step="0.1">
                    </div>
                </div>
            </div>

            <div class="group-box">
                <label class="group-title">🧾 Касова бележка:</label>
                <div class="file-input-container">
                    <span id="receiptStatus" class="upload-status"></span>
                    <input type="file" id="receiptCam" accept="image/*" capture="environment" style="display:none;">
                    <input type="file" id="receiptFile" accept="image/*" style="display:none;">
                    <button type="button" class="select-btn" onclick="document.getElementById('receiptCam').click()">
                        📷 Камера
                    </button>
                    <button type="button" class="select-btn" onclick="document.getElementById('receiptFile').click()">
                        🖼️ Галерия
                    </button>
                    <button type="button" id="deleteReceBtn" class="delete-btn"
                        title="Изчисти снимката и полетата">🗑️</button>
                </div>
                <div class="manual-inputs-grid">
                    <div style="flex: 1;">
                        <label for="manualTotalAmount"
                            style="font-weight: normal; font-size: 12px; margin-bottom: 2px;">Обша сума (€):</label>
                        <input type="number" id="manualTotalAmount" placeholder="" step="0.01">
                    </div>
                    <div style="flex: 1;">
                        <label for="manualLiters"
                            style="font-weight: normal; font-size: 12px; margin-bottom: 2px;">Литри:</label>
                        <input type="number" id="manualLiters" placeholder="" step="0.01">
                    </div>
                    <div style="flex: 1;">
                        <label for="manualDiscount"
                            style="font-weight: normal; font-size: 12px; margin-bottom: 2px;">Отстъпка (€):</label>
                        <input type="number" id="manualDiscount" placeholder="" step="0.01">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn">🚀 Изпрати и анализирай</button>
            <button type="button" id="viewHistoryBtn">📜 История</button>
        </form>

        <div id="statusBox" class="status"></div>

        <!-- Модален прозорец за преглед на снимка -->
        <div id="previewModal" class="modal-overlay">
            <span class="modal-close" id="closeModalBtn">&times;</span>
            <div id="crop-container">
                <img id="previewImage" class="modal-content">
                <div id="crop-box">
                    <div class="handle tl" data-handle="tl"></div>
                    <div class="handle tr" data-handle="tr"></div>
                    <div class="handle bl" data-handle="bl"></div>
                    <div class="handle br" data-handle="br"></div>
                </div>
            </div>
            <button id="cropBtn">✂️ Изрежи и запази</button>
        </div>

        <div id="actionButtonsContainer" class="action-buttons-container">
            <button type="button" id="closeBtn">Затвори</button>
            <button type="button" id="reloadBtn">➕ Ново зареждане</button>
        </div>
    </div>

    <script src="vehicles.js"></script>
    <script src="app.js"></script>
</body>

</html>
